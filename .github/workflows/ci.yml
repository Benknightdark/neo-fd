name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  rust-checks:
    name: Rust Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "rust-scanner-workspace"
        
    - name: Check Formatting
      working-directory: rust-scanner-workspace
      run: cargo fmt --check
      
    - name: Clippy Lints
      working-directory: rust-scanner-workspace
      run: cargo clippy -- -D warnings
      
    - name: Run Tests
      working-directory: rust-scanner-workspace
      run: cargo test

  frontend-checks:
    name: Frontend Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: rust-scanner-workspace/scanner-desktop/package-lock.json
        
    - name: Install Dependencies
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm ci
      
    - name: Lint (Biome)
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm run lint
      
    - name: Build & Typecheck
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm run build
