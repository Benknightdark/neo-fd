name: CI

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  rust-checks:
    name: Rust Checks (${{ matrix.os }})
    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/develop'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "rust-scanner-workspace"
        
    - name: Check Formatting
      working-directory: rust-scanner-workspace
      run: cargo fmt --check
      
    - name: Clippy Lints
      working-directory: rust-scanner-workspace
      run: cargo clippy -- -D warnings
      
    - name: Run Tests
      working-directory: rust-scanner-workspace
      run: cargo test

  frontend-checks:
    name: Frontend Checks (${{ matrix.os }})
    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/develop'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: rust-scanner-workspace/scanner-desktop/package-lock.json
        
    - name: Install Dependencies
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm ci
      
    - name: Lint (Biome)
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm run lint
      
    - name: Build & Typecheck
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm run build
      
    - name: Run Unit Tests
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm run test

  create-pr:
    name: Auto-Create Pull Request
    needs: [rust-checks, frontend-checks]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Compare branches and create PR
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git fetch origin main:main || echo "main branch not loaded locally yet, continuing..."
        
        # Check if there are differences between main and develop
        diff_commits=$(git log main..develop --oneline 2>/dev/null || echo "has_diff")
        
        if [ -z "$diff_commits" ]; then
          echo "No new commits on develop to merge into main. Skipping Pull Request creation."
          exit 0
        fi
        
        # Check if a Pull Request from develop to main already exists
        existing_pr=$(gh pr list --head develop --base main --state open --json number -q '.[0].number' 2>/dev/null || echo "")
        
        if [ -z "$existing_pr" ]; then
          gh pr create \
            --head develop \
            --base main \
            --title "feat: merge develop into main" \
            --body "Automated Pull Request created by GitHub Actions after successful checks on develop."
          echo "Successfully created a new Pull Request!"
        else
          echo "A Pull Request from develop to main already exists (PR #$existing_pr)."
        fi

  release:
    name: Build & Release CD
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Bump version and push tag
      id: tag_version
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch

    - name: Determine Tag and Version
      id: get_version
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "version=${version}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_OUTPUT
          echo "version=${{ steps.tag_version.outputs.new_version }}" >> $GITHUB_OUTPUT
        fi

    - name: Sync Workspace Configurations
      shell: node {0}
      run: |
        const fs = require('fs');
        const newVer = '${{ steps.get_version.outputs.version }}';
        
        // Update root package.json
        const rootPkgPath = 'package.json';
        if (fs.existsSync(rootPkgPath)) {
          const rootPkg = JSON.parse(fs.readFileSync(rootPkgPath, 'utf8'));
          rootPkg.version = newVer;
          fs.writeFileSync(rootPkgPath, JSON.stringify(rootPkg, null, 2) + '\n');
          console.log(`Updated root package.json version to: ${newVer}`);
        }
        
        // Update scanner-desktop/package.json
        const pkgPath = 'rust-scanner-workspace/scanner-desktop/package.json';
        const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
        pkg.version = newVer;
        fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
        console.log(`Updated package.json version to: ${newVer}`);
        
        // Update scanner-desktop/src-tauri/tauri.conf.json
        const tauriPath = 'rust-scanner-workspace/scanner-desktop/src-tauri/tauri.conf.json';
        const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
        tauri.version = newVer;
        fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
        console.log(`Updated tauri.conf.json version to: ${newVer}`);

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: rust-scanner-workspace/scanner-desktop/package-lock.json
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
        
    - name: Install Frontend Dependencies
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm ci

    - name: Build and Publish Tauri Release
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: rust-scanner-workspace/scanner-desktop
        tagName: ${{ steps.get_version.outputs.tag }}
        releaseName: "Scanner Desktop ${{ steps.get_version.outputs.tag }}"
        releaseBody: "自動發布版本 ${{ steps.get_version.outputs.tag }}。請從下方下載對應系統的安裝檔。"
        releaseDraft: true
        prerelease: false
