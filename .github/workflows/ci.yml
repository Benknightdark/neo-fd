name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  rust-checks:
    name: Rust Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "rust-scanner-workspace"
        
    - name: Check Formatting
      working-directory: rust-scanner-workspace
      run: cargo fmt --check
      
    - name: Clippy Lints
      working-directory: rust-scanner-workspace
      run: cargo clippy -- -D warnings
      
    - name: Run Tests
      working-directory: rust-scanner-workspace
      run: cargo test

  frontend-checks:
    name: Frontend Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: rust-scanner-workspace/scanner-desktop/package-lock.json
        
    - name: Install Dependencies
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm ci
      
    - name: Lint (Biome)
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm run lint
      
    - name: Build & Typecheck
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm run build
      
    - name: Run Unit Tests
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm run test

  release:
    name: Build & Release CD
    needs: [rust-checks, frontend-checks]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: rust-scanner-workspace/scanner-desktop/package-lock.json
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
        
    - name: Install Frontend Dependencies
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm ci

    - name: Build and Publish Tauri Release
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: rust-scanner-workspace/scanner-desktop
        tagName: ${{ github.ref_name }}
        releaseName: "Scanner Desktop ${{ github.ref_name }}"
        releaseBody: "自動發布版本 ${{ github.ref_name }}。請從下方下載對應系統的安裝檔。"
        releaseDraft: true
        prerelease: false
