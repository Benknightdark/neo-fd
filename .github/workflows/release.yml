name: Release & Deployment (CD)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]

jobs:
  release:
    name: Build & Release CD
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Bump version and push tag
      id: tag_version
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch

    - name: Determine Tag and Version
      id: get_version
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "version=${version}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_OUTPUT
          echo "version=${{ steps.tag_version.outputs.new_version }}" >> $GITHUB_OUTPUT
        fi

    - name: Sync Workspace Configurations
      shell: node {0}
      run: |
        const fs = require('fs');
        const newVer = '${{ steps.get_version.outputs.version }}';
        
        const rootPkgPath = 'package.json';
        if (fs.existsSync(rootPkgPath)) {
          const rootPkg = JSON.parse(fs.readFileSync(rootPkgPath, 'utf8'));
          rootPkg.version = newVer;
          fs.writeFileSync(rootPkgPath, JSON.stringify(rootPkg, null, 2) + '\n');
          console.log(`Updated root package.json version to: ${newVer}`);
        }
        
        const pkgPath = 'rust-scanner-workspace/scanner-desktop/package.json';
        const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
        pkg.version = newVer;
        fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
        console.log(`Updated package.json version to: ${newVer}`);
        
        const tauriPath = 'rust-scanner-workspace/scanner-desktop/src-tauri/tauri.conf.json';
        const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
        tauri.version = newVer;
        fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
        console.log(`Updated tauri.conf.json version to: ${newVer}`);

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: rust-scanner-workspace/scanner-desktop/package-lock.json
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
        
    - name: Install Frontend Dependencies
      working-directory: rust-scanner-workspace/scanner-desktop
      run: npm ci

    - name: Build and Publish Tauri Release
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: rust-scanner-workspace/scanner-desktop
        tagName: ${{ steps.get_version.outputs.tag }}
        releaseName: "Scanner Desktop ${{ steps.get_version.outputs.tag }}"
        releaseBody: "自動發布版本 ${{ steps.get_version.outputs.tag }}。請從下方下載對應系統的安裝檔。"
        releaseDraft: true
        prerelease: false

    - name: Generate Auto-Release Notes
      if: matrix.os == 'ubuntu-latest'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Generate beautiful release notes (matching .github/release.yml categorizations) and write to a temporary file.
        # This gracefully bypasses older 'gh' CLI versions lacking '--generate-notes' flag inside the edit command.
        gh api repos/:owner/:repo/releases/generate-notes -f tag_name="${{ steps.get_version.outputs.tag }}" -q .body > release_notes.md
        
        # Apply the generated release notes to our draft release.
        gh release edit "${{ steps.get_version.outputs.tag }}" \
          --notes-file release_notes.md \
          --draft
