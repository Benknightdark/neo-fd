# 發布與部署工作流 (CD)：主要用於正式上線打包與 Release 發布
name: Release & Deployment (CD)

on:
  # 當程式碼推送到 main 或 master 分支時觸發（例如 PR 合併時）
  push:
    branches: [ main, master ]
    # 當手動推送版本標籤（如 v1.3.0）時亦會觸發
    tags: [ 'v*' ]

jobs:
  # 階段 1：準備版號與建立 Git Tag（只在單一 Ubuntu 環境執行一次，避免平行競態衝突）
  prepare:
    name: Prepare Version & Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_version.outputs.tag }}
      version: ${{ steps.get_version.outputs.version }}
    permissions:
      contents: write
    steps:
    # 步驟 1：檢出完整 Git 歷史紀錄（以便計算自動版號與產生變更日誌）
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    # 步驟 2：如果是直接推送到 main/master，則自動計算語意化版號並推送新 Git Tag
    - name: Bump version and push tag
      id: tag_version
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch

    # 步驟 3：判定最終要使用的 Tag 與 Version。如果是手動推 Tag 則直接使用該 Tag 名稱
    - name: Determine Tag and Version
      id: get_version
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "version=${version}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_OUTPUT
          echo "version=${{ steps.tag_version.outputs.new_version }}" >> $GITHUB_OUTPUT
        fi

  # 階段 2：平行編譯跨平台 Tauri 桌面安裝包，並上傳至 Draft Release
  build:
    name: Build Tauri App (${{ matrix.label }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    # 給予寫入內容的權限，以便建立 Tag、上傳 Release 物件
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            os: ubuntu-latest
            rust_target: ''
            tauri_args: ''
          - label: windows
            os: windows-latest
            rust_target: ''
            tauri_args: ''
          - label: macos-aarch64
            os: macos-15
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - label: macos-x86_64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
        
    steps:
    # 步驟 1：檢出與 prepare 同步的 Git 狀態
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.prepare.outputs.tag }}
        fetch-depth: 0

    # 步驟 2：使用 Node.js 動態將最新版號同步寫入 package.json 與 tauri.conf.json
    - name: Sync Workspace Configurations
      shell: node {0}
      run: |
        const fs = require('fs');
        const newVer = '${{ needs.prepare.outputs.version }}';
        // 2. 同步桌面端 package.json
        const pkgPath = 'neo-fd-desktop/package.json';
        const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
        pkg.version = newVer;
        fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
        console.log(`Updated package.json version to: ${newVer}`);
        
        // 3. 同步 Tauri 設定檔 tauri.conf.json
        const tauriPath = 'neo-fd-desktop/src-tauri/tauri.conf.json';
        const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
        tauri.version = newVer;
        fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
        console.log(`Updated tauri.conf.json version to: ${newVer}`);

    # 步驟 3：設定 Node.js 執行環境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: neo-fd-desktop/package-lock.json
        
    # 步驟 4：設定 Rust 工具鏈
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # 步驟 5：macOS 分架構建置時，先安裝對應 Rust target
    - name: Add Rust Target
      if: matrix.rust_target != ''
      run: rustup target add ${{ matrix.rust_target }}
      
    # 步驟 6：如果是 Linux 環境，安裝 Tauri 編譯所需的 Linux 相依套件
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
        
    # 步驟 7：安裝前端打包所需的 npm 套件
    - name: Install Frontend Dependencies
      working-directory: neo-fd-desktop
      run: npm ci

    # 步驟 8：編譯跨平台 Tauri 桌面安裝包並上傳至 Draft Release (Tauri Action 會自動上傳二進位檔)
    - name: Build and Upload Tauri Release
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 注入 Apple 簽署與公證所需之環境變數，方便未來設定 Secret 後直接啟用
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      with:
        projectPath: neo-fd-desktop
        args: ${{ matrix.tauri_args }}
        tagName: ${{ needs.prepare.outputs.tag }}
        releaseName: "Neo FD ${{ needs.prepare.outputs.tag }}"
        releaseBody: |
          自動發布版本 ${{ needs.prepare.outputs.tag }}。請從下方下載對應系統的安裝檔。

          ### ⚠️ macOS 使用者安裝說明 (M系列晶片 / Intel 晶片)
          如果您在下載並打開 `.dmg` 或 `.app` 安裝檔時，遇到系統提示 **「已損壞，無法開啟。您應該將它移至垃圾桶」** 或 **「無法確認開發者」**，此為 macOS Gatekeeper 的安全限制（因未配置付費 Apple 開發者憑證所致）。請依照下列步驟快速解除限制：

          1. 將應用程式拖移或解壓放入 **「應用程式 (Applications)」** 資料夾。
          2. 開啟 **「終端機 (Terminal)」** 應用程式。
          3. 輸入以下指令並按 Enter 鍵（可能需要輸入您的 Mac 開機密碼）：
             ```bash
             sudo xattr -cr /Applications/neo-fd-desktop.app
             ```
          4. 重新雙擊開啟應用程式即可正常執行。
        releaseDraft: true # 保持為草稿狀態，等待所有平台編譯完成後統一發布
        prerelease: false


  # 階段 3：自動生成變更日誌，並一鍵公開發布 Release (在 build 完成後觸發)
  publish:
    name: Publish Auto-Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.prepare.outputs.tag }}
        
    - name: Generate Auto-Release Notes & Publish
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 1. 呼叫 GitHub REST API 根據 .github/release.yml 的分類設定產生 Markdown 變更日誌，並導出至暫存檔
        gh api repos/:owner/:repo/releases/generate-notes -f tag_name="${{ needs.prepare.outputs.tag }}" -q .body > release_notes.md
        
        # 2. 將產生的變更日誌寫入這個 Release 中，並正式將其從草稿 (Draft) 變更為公開發布 (Draft: false)
        gh release edit "${{ needs.prepare.outputs.tag }}" \
          --draft=false \
          --notes-file release_notes.md
