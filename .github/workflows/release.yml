# 發布與部署工作流 (CD)：主要用於正式上線打包與 Release 發布
name: Release & Deployment (CD)

on:
  # 當程式碼推送到 main 或 master 分支時觸發（例如 PR 合併時）
  push:
    branches: [ main, master ]
    # 當手動推送版本標籤（如 v1.3.0）時亦會觸發
    tags: [ 'v*' ]

jobs:
  # 階段 1：準備版號與建立 Git Tag（只在單一 Ubuntu 環境執行一次，避免平行競態衝突）
  prepare:
    name: Prepare Version & Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_version.outputs.tag }}
      version: ${{ steps.get_version.outputs.version }}
    permissions:
      contents: write
    steps:
    # 步驟 1：檢出完整 Git 歷史紀錄（以便計算自動版號與產生變更日誌）
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    # 步驟 2：如果是直接推送到 main/master，則自動計算語意化版號並推送新 Git Tag
    - name: Bump version and push tag
      id: tag_version
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch

    # 步驟 3：判定最終要使用的 Tag 與 Version。如果是手動推 Tag 則直接使用該 Tag 名稱
    - name: Determine Tag and Version
      id: get_version
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "version=${version}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_OUTPUT
          echo "version=${{ steps.tag_version.outputs.new_version }}" >> $GITHUB_OUTPUT
        fi

  # 階段 2：平行編譯跨平台 Tauri 桌面安裝包，並上傳至 Draft Release
  build:
    name: Build Tauri App (${{ matrix.label }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    # 給予寫入內容的權限，以便建立 Tag、上傳 Release 物件
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            os: ubuntu-latest
            rust_target: ''
            tauri_args: ''
          - label: windows
            os: windows-latest
            rust_target: ''
            tauri_args: ''
          - label: macos-aarch64
            os: macos-15
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - label: macos-x86_64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
        
    steps:
    # 步驟 1：檢出與 prepare 同步的 Git 狀態
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.prepare.outputs.tag }}
        fetch-depth: 0

    # 步驟 2：使用 Node.js 動態將最新版號同步寫入 package.json 與 tauri.conf.json
    - name: Sync Workspace Configurations
      shell: node {0}
      run: |
        const fs = require('fs');
        const newVer = '${{ needs.prepare.outputs.version }}';
        // 2. 同步桌面端 package.json
        const pkgPath = 'neo-fd-desktop/package.json';
        const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
        pkg.version = newVer;
        fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
        console.log(`Updated package.json version to: ${newVer}`);
        
        // 3. 同步 Tauri 設定檔 tauri.conf.json
        const tauriPath = 'neo-fd-desktop/src-tauri/tauri.conf.json';
        const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
        tauri.version = newVer;
        fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');
        console.log(`Updated tauri.conf.json version to: ${newVer}`);

    # 步驟 3：設定 Node.js 執行環境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: neo-fd-desktop/package-lock.json
        
    # 步驟 4：設定 Rust 工具鏈
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # 步驟 5：macOS 分架構建置時，先安裝對應 Rust target
    - name: Add Rust Target
      if: matrix.rust_target != ''
      run: rustup target add ${{ matrix.rust_target }}
      
    # 步驟 6：如果是 Linux 環境，安裝 Tauri 編譯所需的 Linux 相依套件
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
        
    # 步驟 7：安裝前端打包所需的 npm 套件
    - name: Install Frontend Dependencies
      working-directory: neo-fd-desktop
      run: npm ci

    # 步驟 8：檢查 macOS 簽章設定；缺少 secret 時跳過 macOS 產物，避免產出無法開啟的 DMG
    - name: Check macOS Signing Secrets
      id: macos_signing
      if: runner.os == 'macOS'
      shell: bash
      env:
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        missing=()
        for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
          if [ -z "${!name}" ]; then
            missing+=("$name")
          fi
        done

        if [ "${#missing[@]}" -ne 0 ]; then
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Skipping macOS release artifact because required signing secret(s) are missing: ${missing[*]}"
          {
            echo "### macOS release artifact skipped"
            echo ""
            echo "Missing required signing secret(s): \`${missing[*]}\`."
            echo "Windows and Linux artifacts can still be published. Add the Apple Developer secrets to enable signed and notarized macOS DMG builds."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        echo "ready=true" >> "$GITHUB_OUTPUT"

    # 步驟 9：將 Developer ID Application 憑證匯入暫時 keychain，供 codesign 與 notarization 使用
    - name: Import Apple Developer Certificate
      if: runner.os == 'macOS' && steps.macos_signing.outputs.ready == 'true'
      shell: bash
      env:
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      run: |
        certificate_path="$RUNNER_TEMP/apple-certificate.p12"
        keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
        keychain_password="$(uuidgen)"

        echo "::add-mask::$keychain_password"
        echo "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"

        security create-keychain -p "$keychain_password" "$keychain_path"
        security set-keychain-settings -lut 21600 "$keychain_path"
        security unlock-keychain -p "$keychain_password" "$keychain_path"
        security import "$certificate_path" \
          -k "$keychain_path" \
          -P "$APPLE_CERTIFICATE_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/security
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
        security list-keychains -d user -s "$keychain_path"
        security default-keychain -s "$keychain_path"

        security find-identity -v -p codesigning "$keychain_path"
        if ! security find-identity -v -p codesigning "$keychain_path" | grep -Fq "\"$APPLE_SIGNING_IDENTITY\""; then
          echo "::error::APPLE_SIGNING_IDENTITY was not found in the imported certificate."
          exit 1
        fi

    # 步驟 10：編譯跨平台 Tauri 桌面安裝包並上傳至 Draft Release (Tauri Action 會自動上傳二進位檔)
    - name: Build and Upload Tauri Release
      if: runner.os != 'macOS' || steps.macos_signing.outputs.ready == 'true'
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
      with:
        projectPath: neo-fd-desktop
        args: ${{ matrix.tauri_args }}
        tagName: ${{ needs.prepare.outputs.tag }}
        releaseName: "Neo FD ${{ needs.prepare.outputs.tag }}"
        releaseBody: "自動發布版本 ${{ needs.prepare.outputs.tag }}。請從下方下載對應系統的安裝檔。"
        releaseDraft: true # 保持為草稿狀態，等待所有平台編譯完成後統一發布
        prerelease: false

    # 步驟 11：macOS 發布前驗證簽章與 notarization，避免公開無法開啟的 DMG
    - name: Verify macOS Signing and Notarization
      if: runner.os == 'macOS' && steps.macos_signing.outputs.ready == 'true'
      shell: bash
      run: |
        app_path="$(find neo-fd-desktop/src-tauri/target -path '*/release/bundle/macos/neo-fd-desktop.app' -print -quit)"
        dmg_path="$(find neo-fd-desktop/src-tauri/target -path '*/release/bundle/dmg/*.dmg' -print -quit)"

        if [ -z "$app_path" ]; then
          echo "::error::Cannot find bundled macOS app."
          exit 1
        fi

        codesign --verify --deep --strict --verbose=2 "$app_path"
        spctl --assess --type execute --verbose "$app_path"
        xcrun stapler validate "$app_path"

        if [ -n "$dmg_path" ]; then
          xcrun stapler validate "$dmg_path"
        fi

  # 階段 3：自動生成變更日誌，並一鍵公開發布 Release (在 build 完成後觸發)
  publish:
    name: Publish Auto-Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.prepare.outputs.tag }}
        
    - name: Generate Auto-Release Notes & Publish
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 1. 呼叫 GitHub REST API 根據 .github/release.yml 的分類設定產生 Markdown 變更日誌，並導出至暫存檔
        gh api repos/:owner/:repo/releases/generate-notes -f tag_name="${{ needs.prepare.outputs.tag }}" -q .body > release_notes.md
        
        # 2. 將產生的變更日誌寫入這個 Release 中，並正式將其從草稿 (Draft) 變更為公開發布 (Draft: false)
        gh release edit "${{ needs.prepare.outputs.tag }}" \
          --draft=false \
          --notes-file release_notes.md
